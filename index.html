* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;

  align-items: center;
  height: 100vh;
  font-family: 'Courier New', Courier, monospace;
  overflow: hidden;
  user-select: none;
}
#game-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
#header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 780px;
  color: #fff;
  font-size: 16px;
}
#header .info { display: flex; gap: 30px; }
#header .info span { color: #ffcc00; font-weight: bold; }
canvas {
  border: 3px solid #555;
  background: #111;
  image-rendering: pixelated;
}
#controls {
  color: #888;
  font-size: 13px;
  text-align: center;
}
#controls span { color: #ffcc00; }
#overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  pointer-events: none;
}
#overlay .message {
  background: rgba(0,0,0,0.85);
  color: #fff;
  padding: 30px 50px;
  border-radius: 10px;
  text-align: center;
  border: 2px solid #555;
}
#overlay .message h1 { font-size: 36px; margin-bottom: 10px; color: #ffcc00; }
#overlay .message h2 { font-size: 24px; margin-bottom: 15px; }
#overlay .message p { font-size: 16px; margin: 5px 0; color: #ccc; }
#overlay .message .blink { animation: blink 0.8s infinite; color: #ffcc00; font-size: 18px; margin-top: 15px; }
@keyframes blink { 50% { opacity: 0; } }
#mobile-controls {
  display: none;
  gap: 10px;
  margin-top: 5px;
}
#mobile-controls button {
  width: 55px; height: 55px;
  font-size: 24px;
  background: #333;
  color: #fff;
  border: 2px solid #555;
  border-radius: 10px;
  cursor: pointer;
  touch-action: manipulation;
}
#mobile-controls button:active { background: #ffcc00; color: #000; }
#mobile-controls .fire-btn {
  width: 80px; height: 80px;
  font-size: 32px;
  background: #c0392b;
  border-color: #e74c3c;
  border-radius: 50%;
}
@media (max-width: 800px) {
  #mobile-controls { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; }
  #header { width: 95vw; font-size: 13px; flex-wrap: wrap; }
  canvas { width: 95vw; height: auto; }
}

function playBeep(freq, duration, type = 'square', vol = 0.05) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}
function sfxShoot() { playBeep(200, 0.08, 'square', 0.04); }

// 生成随机地图
function generateRandomMap() {
  const m = [];
  for (let r = 0; r < ROWS; r++) {
    m[r] = [];
    for (let c = 0; c < COLS; c++) {
      // 基地周围保护 (基地在 cols 12-13, rows 18-19)
      if (r >= 17 && r <= 19 && c >= 11 && c <= 14) {
        if ((r === 18 || r === 19) && c >= 12 && c <= 13) { m[r][c] = BASE; }
        else { m[r][c] = BRICK; }
        continue;
      }
      // 边界
      if (r <= 1 || c <= 1 || c >= COLS - 2) {
        m[r][c] = EMPTY;
        continue;
      }
      // 随机生成
      const rand = Math.random();
      if (rand < 0.15) m[r][c] = BRICK;
      else if (rand < 0.18) m[r][c] = STEEL;
      else if (rand < 0.19) m[r][c] = WATER;
      else m[r][c] = EMPTY;
    }
  }
  // 确保出生点干净
  for (const spawn of ENEMY_SPAWNS) {
    for (let dr = 0; dr < 2; dr++)
      for (let dc = 0; dc < 2; dc++)
        m[spawn.row + dr][spawn.col + dc] = EMPTY;
  }
  for (let dr = 0; dr < 2; dr++)
    for (let dc = 0; dc < 2; dc++)
      m[PLAYER_SPAWN.row + dr][PLAYER_SPAWN.col + dc] = EMPTY;
  return m;
}

function loadLevel(lvl) {
  if (LEVEL_MAPS[lvl]) {
    map = LEVEL_MAPS[lvl].map(row => [...row]);
  } else {
    map = generateRandomMap();
  }
  // 确保基地位置有基地 (cols 12-13, rows 18-19)
  map[18][12] = BASE;
  map[18][13] = BASE;
  map[19][12] = BASE;
  map[19][13] = BASE;
  // 确保玩家出生点干净
  for (let dr = 0; dr < 2; dr++)
    for (let dc = -1; dc <= 1; dc++)
      map[PLAYER_SPAWN.row + dr][PLAYER_SPAWN.col + dc] = EMPTY;
  // 确保敌人出生点干净
  for (const spawn of ENEMY_SPAWNS) {
    for (let dr = 0; dr < 2; dr++)
      for (let dc = 0; dc < 2; dc++)
        map[spawn.row + dr][spawn.col + dc] = EMPTY;
  }
}

// 坦克类
class Tank {
  constructor(col, row, dir, color, isPlayer = false) {
    this.col = col;
    this.row = row;
    this.x = col * TILE_SIZE + TILE_SIZE / 2;
    this.y = row * TILE_SIZE + TILE_SIZE / 2;
    this.dir = dir;
    this.color = color;
    this.speed = isPlayer ? PLAYER_SPEED : ENEMY_SPEED;
    this.isPlayer = isPlayer;
    this.alive = true;
    this.shootCooldown = 0;
    this.shootDelay = isPlayer ? 15 : 60;
    this.size = TANK_SIZE;
    this.moveTimer = 0;
    this.moveDir = dir;
    this.flashTimer = 0;
    this.spawnProtection = 60;
  }

  update() {
    if (!this.alive) return;
    if (this.spawnProtection > 0) this.spawnProtection--;
    if (this.shootCooldown > 0) this.shootCooldown--;
    if (this.flashTimer > 0) this.flashTimer--;

    if (!this.isPlayer) {
      // AI
      this.moveTimer--;
      if (this.moveTimer <= 0) {
        this.moveDir = Math.floor(Math.random() * 4);
        this.moveTimer = 40 + Math.floor(Math.random() * 80);
        // 偶尔朝玩家方向
        if (player && player.alive && Math.random() < 0.3) {
          const dx = player.x - this.x;
          const dy = player.y - this.y;
          if (Math.abs(dx) > Math.abs(dy)) {
            this.moveDir = dx > 0 ? RIGHT : LEFT;
          } else {
            this.moveDir = dy > 0 ? DOWN : UP;
          }
        }
      }
      // 随机射击
      if (this.shootCooldown <= 0 && Math.random() < 0.02) {
        this.shoot();
      }
      // 如果朝基地方向，增加射击概率
      const baseX = 12.5 * TILE_SIZE;
      const baseY = 18.5 * TILE_SIZE;
      const dxb = baseX - this.x;
      const dyb = baseY - this.y;
      if (Math.abs(dxb) < 150 && Math.abs(dyb) < 200 && this.shootCooldown <= 0 && Math.random() < 0.03) {
        this.dir = dyb > 0 ? DOWN : UP;
        this.moveDir = this.dir;
        this.shoot();
      }

      this.move(this.moveDir);
    }
  }

  move(dir) {
    this.dir = dir;
    let dx = 0, dy = 0;
    if (dir === UP) dy = -this.speed;
    else if (dir === DOWN) dy = this.speed;
    else if (dir === LEFT) dx = -this.speed;
    else if (dir === RIGHT) dx = this.speed;

    const newX = this.x + dx;
    const newY = this.y + dy;

    if (this.canMoveTo(newX, newY)) {
      this.x = newX;
      this.y = newY;
    } else {
      // 滑动碰撞 - 尝试单轴移动
      if (dx !== 0 && this.canMoveTo(newX, this.y)) {
        this.x = newX;
      } else if (dy !== 0 && this.canMoveTo(this.x, newY)) {
        this.y = newY;
      }
    }
  }

  canMoveTo(x, y) {
    const half = this.size / 2;
    // 边界
    if (x - half < 0 || x + half > COLS * TILE_SIZE ||
        y - half < 0 || y + half > ROWS * TILE_SIZE) {
      return false;
    }
    // 地图图块碰撞
    const corners = [
      { cx: x - half + 2, cy: y - half + 2 },
      { cx: x + half - 2, cy: y - half + 2 },
      { cx: x - half + 2, cy: y + half - 2 },
      { cx: x + half - 2, cy: y + half - 2 },
    ];
    for (const corner of corners) {
      const col = Math.floor(corner.cx / TILE_SIZE);
      const row = Math.floor(corner.cy / TILE_SIZE);
      if (row < 0 || row >= ROWS || col < 0 || col >= COLS) continue;
      const tile = map[row][col];
      if (tile === BRICK || tile === STEEL || tile === BASE) return false;
      if (tile === WATER && !this.isPlayer) return false; // AI不能过水
    }
    // 与其他坦克碰撞
    const allTanks = this.isPlayer ? enemies : [player, ...enemies.filter(e => e !== this && e.alive)];
    if (!this.isPlayer) allTanks.push(player);
    for (const other of allTanks) {
      if (!other || !other.alive || other === this) continue;
      const dist = Math.hypot(x - other.x, y - other.y);
      if (dist < this.size) return false;
    }
    return true;
  }

  shoot() {
    if (this.shootCooldown > 0) return;
    this.shootCooldown = this.shootDelay;
    const bulletX = this.dir === LEFT ? this.x - this.size / 2 :
                    this.dir === RIGHT ? this.x + this.size / 2 : this.x;
    const bulletY = this.dir === UP ? this.y - this.size / 2 :
                    this.dir === DOWN ? this.y + this.size / 2 : this.y;
    bullets.push(new Bullet(bulletX, bulletY, this.dir, this.isPlayer, this.isPlayer ? playerLevel : 1));
    // 双发
    if (this.isPlayer && playerLevel >= 3) {
      const offset = 6;
      const bx2 = this.dir === UP || this.dir === DOWN ? this.x + offset : bulletX;
      const by2 = this.dir === LEFT || this.dir === RIGHT ? this.y + offset : bulletY;
      bullets.push(new Bullet(bx2, by2, this.dir, this.isPlayer, playerLevel));
      const bx3 = this.dir === UP || this.dir === DOWN ? this.x - offset : bulletX;
      const by3 = this.dir === LEFT || this.dir === RIGHT ? this.y - offset : bulletY;
      bullets.push(new Bullet(bx3, by3, this.dir, this.isPlayer, playerLevel));
    }
    sfxShoot();
  }

  draw() {
    if (!this.alive) return;
    if (this.spawnProtection > 0 && Math.floor(this.spawnProtection / 4) % 2 === 0) return;

    ctx.save();
    ctx.translate(this.x, this.y);
    const angle = this.dir === UP ? -Math.PI/2 :
                  this.dir === DOWN ? Math.PI/2 :
                  this.dir === LEFT ? Math.PI : 0;
    ctx.rotate(angle);

    const h = this.size / 2;

    // 履带
    ctx.fillStyle = '#222';
    ctx.fillRect(-h, -h + 2, h * 2, 5);
    ctx.fillRect(-h, h - 7, h * 2, 5);
    // 履带纹理
    ctx.fillStyle = '#444';
    for (let i = -h + 3; i < h - 3; i += 5) {
      ctx.fillRect(i, -h + 3, 3, 3);
      ctx.fillRect(i, h - 6, 3, 3);
    }

    // 车身
    const bodyGrad = ctx.createLinearGradient(0, -h + 5, 0, h - 7);
    bodyGrad.addColorStop(0, this.color);
    bodyGrad.addColorStop(1, this.flashTimer > 0 ? '#fff' : this.color);
    ctx.fillStyle = bodyGrad;
    ctx.fillRect(-h + 3, -h + 7, h * 2 - 6, h * 2 - 14);

    // 炮塔
    const turretColor = this.isPlayer ? '#2ecc71' : '#ff6b6b';
    ctx.fillStyle = turretColor;
    ctx.beginPath();
    ctx.arc(0, 0, h * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // 炮管
    ctx.fillStyle = this.isPlayer ? '#27ae60' : '#c0392b';
    ctx.fillRect(-3, -h, 6, h * 0.6);

    // 玩家标记
    if (this.isPlayer) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 10px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('P1', 0, 4);
    }

    ctx.restore();
  }

  hit() {
    this.flashTimer = 8;
    if (this.spawnProtection > 0) return false;
    return true;
  }
}

// 子弹类
class Bullet {
  constructor(x, y, dir, isPlayerBullet, power = 1) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.isPlayerBullet = isPlayerBullet;
    this.alive = true;
    this.power = power; // 1=普通, 4=穿甲
  }

  update() {
    if (!this.alive) return;
    const speed = BULLET_SPEED;
    if (this.dir === UP) this.y -= speed;
    else if (this.dir === DOWN) this.y += speed;
    else if (this.dir === LEFT) this.x -= speed;
    else if (this.dir === RIGHT) this.x += speed;

    // 出界
    if (this.x < 0 || this.x > COLS * TILE_SIZE || this.y < 0 || this.y > ROWS * TILE_SIZE) {
      this.alive = false;
      return;
    }

    // 地图碰撞
    const col = Math.floor(this.x / TILE_SIZE);
    const row = Math.floor(this.y / TILE_SIZE);
    if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
      const tile = map[row][col];
      if (tile === BRICK) {
        map[row][col] = EMPTY;
        spawnParticles(col * TILE_SIZE + TILE_SIZE/2, row * TILE_SIZE + TILE_SIZE/2, '#c09853');
        if (this.power < 4) this.alive = false;
        sfxHit();
      } else if (tile === STEEL) {
        if (this.power >= 4) {
          map[row][col] = EMPTY;
          spawnParticles(col * TILE_SIZE + TILE_SIZE/2, row * TILE_SIZE + TILE_SIZE/2, '#ccc');
          sfxHit();
        } else {
          this.alive = false;
          spawnParticles(this.x, this.y, '#fff', 2);
        }
      } else if (tile === BASE) {
        map[row][col] = EMPTY;
        spawnParticles(col * TILE_SIZE + TILE_SIZE/2, row * TILE_SIZE + TILE_SIZE/2, '#ff0000', 15);
        this.alive = false;
        sfxExplode();
        if (gameState === 'playing') gameOver();
      }
    }
  }

  draw() {
    if (!this.alive) return;
    ctx.fillStyle = this.isPlayerBullet ? '#ffcc00' : '#ff4444';
    ctx.shadowColor = this.isPlayerBullet ? '#ffcc00' : '#ff4444';
    ctx.shadowBlur = 3;
    ctx.fillRect(this.x - 2, this.y - 2, 4, 4);
    ctx.shadowBlur = 0;
  }
}

// 粒子系统
function spawnParticles(x, y, color, count = 6) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y, color,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 15 + Math.random() * 15,
      size: 2 + Math.random() * 4,
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
  }
  particles = particles.filter(p => p.life > 0);
}

function drawParticles() {
  for (const p of particles) {
    const alpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = alpha;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// 道具类
class PowerUp {
  constructor(col, row, type) {
    this.x = col * TILE_SIZE + TILE_SIZE / 2;
    this.y = row * TILE_SIZE + TILE_SIZE / 2;
    this.type = type; // 'star', 'bomb', 'shield', 'life', 'freeze'
    this.alive = true;
    this.life = 600; // 10秒
  }

  update() {
    this.life--;
    if (this.life <= 0) this.alive = false;
    // 闪烁提示即将消失
    if (this.life < 120 && Math.floor(this.life / 10) % 2 === 0) return;
  }

  draw() {
    if (!this.alive) return;
    ctx.save();
    ctx.translate(this.x, this.y);

    // 浮动效果
    const floatY = Math.sin(frameCount * 0.1) * 3;
    ctx.translate(0, floatY);

    // 背景圆
    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#666';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 图标
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (this.type === 'star') ctx.fillText('⭐', 0, 0);
    else if (this.type === 'bomb') ctx.fillText('💣', 0, 0);
    else if (this.type === 'life') ctx.fillText('❤️', 0, 0);
    else if (this.type === 'freeze') ctx.fillText('❄️', 0, 0);
    else if (this.type === 'shield') ctx.fillText('🛡', 0, 0);

    ctx.restore();
  }
}

// 生成道具
function spawnPowerUp() {
  if (powerUps.length >= 2) return;
  const types = ['star', 'star', 'bomb', 'life', 'freeze', 'shield'];
  const type = types[Math.floor(Math.random() * types.length)];
  // 寻找空地
  let attempts = 0;
  while (attempts < 30) {
    const col = 2 + Math.floor(Math.random() * (COLS - 4));
    const row = 4 + Math.floor(Math.random() * (ROWS - 6));
    if (map[row][col] === EMPTY) {
      powerUps.push(new PowerUp(col, row, type));
      return;
    }
    attempts++;
  }
}

// 子弹与坦克碰撞检测
function checkBulletTankCollisions() {
  for (const bullet of bullets) {
    if (!bullet.alive) continue;
    if (bullet.isPlayerBullet) {
      // 玩家子弹打敌人
      for (const enemy of enemies) {
        if (!enemy.alive) continue;
        if (Math.hypot(bullet.x - enemy.x, bullet.y - enemy.y) < enemy.size / 2) {
          if (enemy.hit()) {
            enemy.alive = false;
            spawnParticles(enemy.x, enemy.y, '#ff4444', 12);
            sfxExplode();
            score += 100;
            enemiesOnField--;
            enemiesRemaining--;
            // 随机道具
            if (Math.random() < 0.2) spawnPowerUp();
          }
          bullet.alive = false;
          break;
        }
      }
    } else {
      // 敌人子弹打玩家
      if (!player || !player.alive) continue;
      if (Math.hypot(bullet.x - player.x, bullet.y - player.y) < player.size / 2) {
        if (player.hit()) {
          playerDeath();
        }
        bullet.alive = false;
      }
    }
  }
}

function playerDeath() {
  spawnParticles(player.x, player.y, '#2ecc71', 15);
  sfxExplode();
  player.alive = false;
  lives--;
  playerLevel = 1;
  if (lives <= 0) {
    gameOver();
  } else {
    // 重生
    setTimeout(() => {
      if (gameState !== 'playing') return;
      player = new Tank(PLAYER_SPAWN.col, PLAYER_SPAWN.row, UP, '#4CAF50', true);
    }, 1500);
  }
}

// 碰撞检测坦克与道具
function checkPlayerPowerUpCollision() {
  if (!player || !player.alive) return;
  for (const pu of powerUps) {
    if (!pu.alive) continue;
    if (Math.hypot(player.x - pu.x, player.y - pu.y) < 20) {
      pu.alive = false;
      applyPowerUp(pu.type);
    }
  }
}

function applyPowerUp(type) {
  sfxPowerUp();
  switch (type) {
    case 'star':
      playerLevel = Math.min(4, playerLevel + 1);
      player.shootDelay = Math.max(6, 15 - (playerLevel - 1) * 3);
      player.speed = PLAYER_SPEED + (playerLevel - 1) * 0.5;
      break;
    case 'bomb':
      // 清除所有敌人
      for (const enemy of enemies) {
        if (enemy.alive) {
          enemy.alive = false;
          spawnParticles(enemy.x, enemy.y, '#ff4444', 10);
          score += 100;
          enemiesOnField--;
          enemiesRemaining--;
        }
      }
      sfxExplode();
      break;
    case 'life':
      lives = Math.min(5, lives + 1);
      break;
    case 'freeze':
      // 暂停所有敌人
      for (const enemy of enemies) {
        if (enemy.alive) enemy.moveTimer += 180;
      }
      break;
    case 'shield':
      if (player) player.spawnProtection = 300;
      break;
  }
}

// 敌人AI发射子弹的更新
function updateEnemyShooting() {
  for (const enemy of enemies) {
    if (!enemy.alive) continue;
    if (enemy.shootCooldown <= 0) {
      // 检查是否对准基地或玩家
      const targetX = player && player.alive ? player.x : 12.5 * TILE_SIZE;
      const targetY = player && player.alive ? player.y : 18.5 * TILE_SIZE;
      const dx = targetX - enemy.x;
      const dy = targetY - enemy.y;
      const aligned = (Math.abs(dx) < TANK_SIZE && (enemy.dir === RIGHT || enemy.dir === LEFT)) ||
                       (Math.abs(dy) < TANK_SIZE && (enemy.dir === UP || enemy.dir === DOWN));
      if (aligned || Math.random() < 0.015) {
        if (aligned) {
          enemy.dir = dx > 0 ? RIGHT : dx < 0 ? LEFT : dy > 0 ? DOWN : UP;
        }
        enemy.shoot();
      }
    }
  }
}

// 生成敌人坦克
function spawnEnemy() {
  if (enemiesRemaining <= 0) return;
  if (enemiesOnField >= maxEnemiesOnField) return;

  const spawn = ENEMY_SPAWNS[Math.floor(Math.random() * ENEMY_SPAWNS.length)];
  // 检查出生点是否被占用
  const sx = spawn.col * TILE_SIZE + TILE_SIZE / 2;
  const sy = spawn.row * TILE_SIZE + TILE_SIZE / 2;
  for (const enemy of enemies) {
    if (enemy.alive && Math.hypot(sx - enemy.x, sy - enemy.y) < TANK_SIZE) return;
  }
  if (player && player.alive && Math.hypot(sx - player.x, sy - player.y) < TANK_SIZE) return;

  const enemy = new Tank(spawn.col, spawn.row, DOWN, '#e74c3c', false);
  // 随关卡增加速度
  enemy.speed = ENEMY_SPEED + (level - 1) * 0.2;
  enemy.shootDelay = Math.max(30, 60 - (level - 1) * 5);
  enemies.push(enemy);
  enemiesOnField++;
}

// 检查胜利条件
function checkWin() {
  if (enemiesRemaining <= 0 && enemiesOnField <= 0 && gameState === 'playing') {
    gameState = 'win';
    sfxPowerUp();
    setTimeout(nextLevel, 2000);
  }
}

function nextLevel() {
  level++;
  playerLevel = Math.min(4, playerLevel);
  const carryOverLives = lives;
  const carryOverScore = score;
  initGame();
  level = level;
  lives = carryOverLives;
  score = carryOverScore;
  enemiesRemaining = 18 + level * 2;
  maxEnemiesOnField = Math.min(6, 3 + Math.floor(level / 2));
  loadLevel(level > 3 ? ((level - 1) % 3 + 1) : level);
  gameState = 'playing';
  player = new Tank(PLAYER_SPAWN.col, PLAYER_SPAWN.row, UP, '#4CAF50', true);
}

// 游戏结束
function gameOver() {
  gameState = 'gameover';
  sfxGameOver();
}

// 重新开始
function restartGame() {
  level = 1;
  score = 0;
  lives = 3;
  playerLevel = 1;
  enemiesRemaining = 20;
  enemiesOnField = 0;
  maxEnemiesOnField = 4;
  initGame();
  loadLevel(level);
  gameState = 'playing';
  player = new Tank(PLAYER_SPAWN.col, PLAYER_SPAWN.row, UP, '#4CAF50', true);
}

function initGame() {
  enemies = [];
  bullets = [];
  particles = [];
  powerUps = [];
  enemiesOnField = 0;
  player = null;
}

// 绘制地图
function drawMap() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = map[r][c];
      const x = c * TILE_SIZE;
      const y = r * TILE_SIZE;

      if (tile === BRICK) {
        ctx.fillStyle = '#c09853';
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = '#a07840';
        ctx.fillRect(x + 2, y + 2, TILE_SIZE/2 - 2, TILE_SIZE/2 - 2);
        ctx.fillRect(x + TILE_SIZE/2, y + TILE_SIZE/2, TILE_SIZE/2 - 2, TILE_SIZE/2 - 2);
        ctx.strokeStyle = '#8B6914';
        ctx.lineWidth = 1;
        ctx.strokeRect(x + 1, y + 1, TILE_SIZE - 2, TILE_SIZE - 2);
      } else if (tile === STEEL) {
        ctx.fillStyle = '#999';
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        ctx.fillStyle = '#bbb';
        ctx.fillRect(x + 3, y + 3, TILE_SIZE - 6, TILE_SIZE - 6);
        ctx.fillStyle = '#777';
        ctx.fillRect(x + 5, y + 5, TILE_SIZE - 10, TILE_SIZE - 10);
      } else if (tile === WATER) {
        ctx.fillStyle = '#2980b9';
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        // 水波纹
        ctx.fillStyle = '#3498db';
        const waveOffset = Math.sin(frameCount * 0.1 + c + r) * 3;
        ctx.fillRect(x + 4, y + 4 + waveOffset, TILE_SIZE - 8, 4);
        ctx.fillRect(x + 6, y + 14 + waveOffset * 0.7, TILE_SIZE - 12, 3);
      } else if (tile === BASE) {
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
        // 老鹰标志
        ctx.fillStyle = '#ffcc00';
        ctx.beginPath();
        const cx = x + TILE_SIZE/2;
        const cy = y + TILE_SIZE/2;
        ctx.moveTo(cx, cy - 8);
        ctx.lineTo(cx + 8, cy + 6);
        ctx.lineTo(cx, cy + 1);
        ctx.lineTo(cx - 8, cy + 6);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 8px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('HQ', cx, cy + 10);
      } else {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
      }
    }
  }
}

// 绘制覆盖层
function drawOverlay() {
  // 开始画面
  if (gameState === 'start') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 48px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('坦 克 大 战', canvas.width/2, 180);
    ctx.fillStyle = '#fff';
    ctx.font = '18px "Courier New"';
    ctx.fillText('TANK BATTLE', canvas.width/2, 215);

    ctx.fillStyle = '#ccc';
    ctx.font = '16px Arial';
    const instructions = [
      '',
      '🎮 W A S D 或 ↑ ← ↓ → 移动坦克',
      '🔫 空格键 或 J 键 射击',
      '⏸ P 键 暂停游戏',
      '',
      '💡 保护基地！消灭所有敌人！',
      '⭐ 拾取道具升级坦克',
    ];
    instructions.forEach((line, i) => {
      ctx.fillText(line, canvas.width/2, 270 + i * 30);
    });

    // 闪烁文字
    if (Math.floor(frameCount / 30) % 2 === 0) {
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 20px Arial';
      ctx.fillText('按 空格键 或 Enter 开始游戏', canvas.width/2, 520);
    }
  }

  // 暂停
  if (gameState === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停中', canvas.width/2, 280);
    ctx.fillStyle = '#fff';
    ctx.font = '18px Arial';
    ctx.fillText('按 P 继续', canvas.width/2, 320);
  }

  // 胜利
  if (gameState === 'win') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 40px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🎉 关卡 ' + level + ' 胜利！', canvas.width/2, 280);
    ctx.fillStyle = '#fff';
    ctx.font = '18px Arial';
    ctx.fillText('准备进入下一关...', canvas.width/2, 320);
    ctx.fillText('得分: ' + score, canvas.width/2, 350);
  }

  // 失败
  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.8)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e74c3c';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('游 戏 结 束', canvas.width/2, 250);
    ctx.fillStyle = '#fff';
    ctx.font = '20px Arial';
    ctx.fillText('最终得分: ' + score, canvas.width/2, 300);
    ctx.fillText('到达关卡: ' + level, canvas.width/2, 330);
    if (Math.floor(frameCount / 30) % 2 === 0) {
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 20px Arial';
      ctx.fillText('按 空格键 重新开始', canvas.width/2, 400);
    }
  }
}

// 更新UI
function updateUI() {
  levelDisplay.textContent = level;
  enemyCountDisplay.textContent = enemiesRemaining + enemiesOnField;
  const hearts = '❤️'.repeat(Math.max(0, lives));
  livesDisplay.textContent = hearts || '💀';
  scoreDisplay.textContent = score;
}

// 主循环
function gameLoop() {
  frameCount++;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (gameState === 'playing') {
    // 玩家操作
    if (player && player.alive) {
      const up = keys['w'] || keys['arrowup'] || mobileInput.up;
      const down = keys['s'] || keys['arrowdown'] || mobileInput.down;
      const left = keys['a'] || keys['arrowleft'] || mobileInput.left;
      const right = keys['d'] || keys['arrowright'] || mobileInput.right;
      const shoot = keys[' '] || keys['j'] || mobileInput.fire;

      if (up) player.move(UP);
      if (down) player.move(DOWN);
      if (left) player.move(LEFT);
      if (right) player.move(RIGHT);
      // 只响应刚按下的射击键（防止连续发射）
      if (shoot && !keys._prevShoot) {
        player.shoot();
      }
      keys._prevShoot = shoot;

      player.update();
    }

    // 更新子弹
    for (const bullet of bullets) bullet.update();
    bullets = bullets.filter(b => b.alive);

    // 更新敌人
    for (const enemy of enemies) enemy.update();
    enemies = enemies.filter(e => e.alive || e.flashTimer > 0);

    // 更新道具
    for (const pu of powerUps) pu.update();
    powerUps = powerUps.filter(p => p.alive);

    // 碰撞检测
    checkBulletTankCollisions();
    checkPlayerPowerUpCollision();

    // 更新粒子
    updateParticles();

    // 生成敌人
    enemySpawnTimer--;
    if (enemySpawnTimer <= 0 && enemiesRemaining > 0) {
      spawnEnemy();
      enemySpawnTimer = 120 + Math.floor(Math.random() * 60);
    }

    // 检查胜利
    checkWin();

    // 更新射击冷却
    for (const enemy of enemies) {
      if (enemy.alive) enemy.shootCooldown = Math.max(0, enemy.shootCooldown - 1);
    }
    if (player && player.alive) player.shootCooldown = Math.max(0, player.shootCooldown - 1);
  }

  // 绘制
  drawMap();
  for (const pu of powerUps) pu.draw();
  drawParticles();
  for (const enemy of enemies) enemy.draw();
  if (player) player.draw();
  for (const bullet of bullets) bullet.draw();
  drawOverlay();
  updateUI();

  requestAnimationFrame(gameLoop);
}

// 输入处理
window.addEventListener('keydown', (e) => {
  keys[e.key.toLowerCase()] = true;
  keyJustPressed[e.key.toLowerCase()] = true;

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if (gameState === 'start') {
      initGame();
      loadLevel(level);
      gameState = 'playing';
      player = new Tank(PLAYER_SPAWN.col, PLAYER_SPAWN.row, UP, '#4CAF50', true);
    } else if (gameState === 'gameover') {
      restartGame();
    }
  }

  if (e.key === 'p' || e.key === 'P') {
    if (gameState === 'playing') gameState = 'paused';
    else if (gameState === 'paused') gameState = 'playing';
  }
});

window.addEventListener('keyup', (e) => {
  keys[e.key.toLowerCase()] = false;
});

// 移动端控制
function setupMobileControls() {
  const btnUp = document.getElementById('btn-up');
  const btnDown = document.getElementById('btn-down');
  const btnLeft = document.getElementById('btn-left');
  const btnRight = document.getElementById('btn-right');
  const btnFire = document.getElementById('btn-fire');

  function addMultiTouchListeners(el, key) {
    el.addEventListener('touchstart', (e) => {
      e.preventDefault();
      mobileInput[key] = true;
      if (gameState === 'start') {
        initGame();
        loadLevel(level);
        gameState = 'playing';
        player = new Tank(PLAYER_SPAWN.col, PLAYER_SPAWN.row, UP, '#4CAF50', true);
      } else if (gameState === 'gameover') {
        restartGame();
      }
    });
    el.addEventListener('touchend', (e) => {
      e.preventDefault();
      mobileInput[key] = false;
    });
    el.addEventListener('touchcancel', () => { mobileInput[key] = false; });
    el.addEventListener('mousedown', () => {
      mobileInput[key] = true;
      if (gameState === 'start' && key === 'fire') {
        initGame();
        loadLevel(level);
        gameState = 'playing';
        player = new Tank(PLAYER_SPAWN.col, PLAYER_SPAWN.row, UP, '#4CAF50', true);
      } else if (gameState === 'gameover' && key === 'fire') {
        restartGame();
      }
    });
    el.addEventListener('mouseup', () => { mobileInput[key] = false; });
    el.addEventListener('mouseleave', () => { mobileInput[key] = false; });
  }

  addMultiTouchListeners(btnUp, 'up');
  addMultiTouchListeners(btnDown, 'down');
  addMultiTouchListeners(btnLeft, 'left');
  addMultiTouchListeners(btnRight, 'right');
  addMultiTouchListeners(btnFire, 'fire');
}

// 启动
loadLevel(level);
setupMobileControls();
gameLoop();
</script>
